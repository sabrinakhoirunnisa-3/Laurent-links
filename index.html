<!DOCTYPE html>

<head>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: #f5f5f5;
            min-height: 100vh;
            position: relative;
            padding-bottom: 60px;
            overflow-x: hidden; /* Mencegah geser samping saat animasi */
        }

        .header-bg {
            background-color: #000;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            height: 180px;
            width: 100%;
        }

        .profile-section {
            text-align: center;
            margin-top: -60px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2b1b3d;
            border: 4px solid #f5f5f5;
            object-fit: cover;
            background-image: url('upphoto.jpg');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
            /* Tambahan Animasi Muncul & Melayang */
            animation: fadeUp 0.8s ease-out forwards, float 3s ease-in-out infinite 0.8s;
        }

        .name {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            font-weight: normal;
            margin-top: 10px;
            line-height: 1;
            /* Animasi */
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.2s forwards;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-top: 5px;
            margin-bottom: 30px;
            font-weight: 300;
            /* Animasi */
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.4s forwards;
        }

        .links-container {
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: #000;
            border: 1px solid #000;
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); /* Transisi lebih mulus */
            /* Animasi Muncul Berurutan */
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        /* Delay animasi tiap tombol biar munculnya gantian */
        .link-btn:nth-child(1) { animation-delay: 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.6s; }
        .link-btn:nth-child(3) { animation-delay: 0.7s; }
        .link-btn:nth-child(4) { animation-delay: 0.8s; }
        .link-btn:nth-child(5) { animation-delay: 0.9s; }

        .link-btn:hover {
            background-color: #000;
            color: #fff;
            transform: scale(1.03); /* Efek membesar sedikit */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Bayangan halus */
        }

        .link-btn.underline {
            text-decoration: underline;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Transisi mantul (bouncy) */
            /* Animasi */
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        /* Delay animasi ikon */
        .icon-circle:nth-child(1) { animation-delay: 1.0s; }
        .icon-circle:nth-child(2) { animation-delay: 1.1s; }
        .icon-circle:nth-child(3) { animation-delay: 1.2s; }

        .icon-circle:hover {
            background-color: #000;
            color: #fff;
            transform: translateY(-5px) scale(1.1) rotate(8deg); /* Efek lompat & miring lucu */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .footer-banner {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            text-align: center;
            padding: 15px 10px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        /* --- KUMPULAN ANIMASI (KEYFRAMES) --- */
        
        /* Animasi naik ke atas dan muncul */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animasi melayang naik turun */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px); /* Jarak melayang */
            }
        }
    </style>
</head>
<body>

            <a href="https://whatsapp.com/channel/0029VbCaEJw5PO0uFVEEhV0x" class="link-btn underline" target="_blank">LINK GROUP</a>
            <a href="https://t.me/Xvsbnnc" class="link-btn" target="_blank">CONTACT ME ON TELEGRAM</a>
        </div>

        <div class="social-icons">

            <a href="#" class="icon-circle"><i class="fa-regular fa-envelope"></i></a>

        </div>

        <div class="footer-banner">
            CHARACTER.AI/PROFILE/LEORAZYRAN.COM
        </div>
    </div>

</body>
