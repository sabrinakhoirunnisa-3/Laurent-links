<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabrina Laurent - Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f5; /* Warna krem/abu-abu terang */
            display: flex;
            justify-content: center;
            color: #000;
        }

        /* Container utama menyerupai layar HP */
        .container {
            width: 100%;
            max-width: 480px;
            background-color: #f5f5f5;
            min-height: 100vh;
            position: relative;
            padding-bottom: 60px;
        }

        /* Header atas (Background hitam floral) */
        .header-bg {
            background-color: #000;
            /* Tambahkan URL gambar floral kamu di bawah ini */
            background-image: url('URL_GAMBAR_FLORAL_KAMU_DISINI'); 
            background-size: cover;
            background-position: center;
            height: 180px;
            width: 100%;
        }

        /* Area Profil */
        .profile-section {
            text-align: center;
            margin-top: -60px; /* Menarik gambar ke atas agar menimpa header */
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2b1b3d; /* Warna ungu gelap c.ai */
            border: 4px solid #f5f5f5;
            object-fit: cover;
            /* Tambahkan URL logo c.ai kamu di bawah ini */
            background-image: url('URL_GAMBAR_LOGO_KAMU_DISINI');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
        }

        /* Nama dan Titel */
        .name {
            font-family: 'Alex Brush', cursive; /* Font latin/script */
            font-size: 3.5rem;
            font-weight: normal;
            margin-top: 10px;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-top: 5px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Tombol Link */
        .links-container {
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: #000;
            border: 1px solid #000;
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background-color: #000;
            color: #fff;
        }

        .link-btn.underline {
            text-decoration: underline;
        }

        /* Ikon Sosial Media */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .icon-circle:hover {
            background-color: #000;
            color: #fff;
        }

        /* Footer Banner */
        .footer-banner {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            text-align: center;
            padding: 15px 10px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bg"></div>

        <div class="profile-section">
            <div class="profile-img"></div>
            <h1 class="name">Sabrina Laurent</h1>
            <p class="subtitle">CREATOR</p>
        </div>

        <div class="links-container">
            <a href="#" class="link-btn">ABOUT ME</a>
            <a href="#" class="link-btn underline">CHARACTER AI</a>
            <a href="#" class="link-btn underline">EMOCHI</a>
            <a href="#" class="link-btn underline">LINK GROUP</a>
            <a href="#" class="link-btn">CONTACT ME</a>
        </div>

        <div class="social-icons">
            <a href="#" class="icon-circle"><i class="fa-solid fa-headphones"></i></a>
            <a href="#" class="icon-circle"><i class="fa-regular fa-envelope"></i></a>
            <a href="#" class="icon-circle"><i class="fa-solid fa-globe"></i></a>
        </div>

        <div class="footer-banner">
            CHARACTER.AI/PROFILE/LEORAZYRAN.COM
        </div>
    </div>

</body>
</html>
