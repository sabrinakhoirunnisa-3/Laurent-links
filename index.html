<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabrina Laurent - Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fce4ec; 
            display: flex;
            justify-content: center;
            color: #000;
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: #fef7f9; 
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* --- BACKGROUND HEARTS --- */
        .background-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 0;
        }

        .heart-particle {
            position: absolute;
            color: #ff80ab; 
            font-size: 14px;
            opacity: 0.5;
            animation: heartFloat infinite linear;
        }

        .heart-particle:nth-child(1) { left: 10%; top: 20%; animation-duration: 15s; }
        .heart-particle:nth-child(2) { left: 80%; top: 30%; animation-duration: 20s; animation-delay: -5s; font-size: 18px; }
        .heart-particle:nth-child(3) { left: 40%; top: 50%; animation-duration: 18s; animation-delay: -2s; }
        .heart-particle:nth-child(4) { left: 90%; top: 70%; animation-duration: 25s; }
        .heart-particle:nth-child(5) { left: 20%; top: 85%; animation-duration: 22s; animation-delay: -10s; font-size: 16px;}
        .heart-particle:nth-child(6) { left: 70%; top: 90%; animation-duration: 17s; animation-delay: -7s; }

        /* --- BACKGROUND KUPU-KUPU GLOWING (3D CSS) --- */
        .butterfly-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .butterfly-wrapper {
            position: absolute;
            animation: flyUp linear infinite;
        }

        .butterfly {
            position: relative;
            width: 40px;
            height: 40px;
            transform-style: preserve-3d;
            transform: rotateX(50deg) rotateY(20deg) rotateZ(15deg); /* Efek kemiringan 3D */
        }

        .wing {
            position: absolute;
            width: 22px;
            height: 35px;
            /* Warna ungu glowing holografik seperti di foto */
            background: linear-gradient(135deg, rgba(224, 176, 255, 0.7), rgba(162, 114, 255, 0.4));
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.6);
            border-radius: 50% 50% 10% 50%;
        }

        .wing-left {
            left: 0;
            transform-origin: right center;
            animation: flapLeft 0.15s ease-in-out infinite alternate;
        }

        .wing-right {
            right: 0;
            border-radius: 50% 50% 50% 10%;
            transform-origin: left center;
            animation: flapRight 0.15s ease-in-out infinite alternate;
        }

        /* Animasi kepakan sayap */
        @keyframes flapLeft {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-70deg); }
        }
        @keyframes flapRight {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(70deg); }
        }

        /* Posisi dan kecepatan terbang masing-masing kupu-kupu */
        .b1 { top: 110%; left: 15%; animation-duration: 12s; transform: scale(0.8); }
        .b2 { top: 110%; left: 75%; animation-duration: 16s; animation-delay: 3s; transform: scale(1.1); }
        .b3 { top: 110%; left: 45%; animation-duration: 20s; animation-delay: 8s; transform: scale(0.6); }

        /* Jalur terbang meliuk-liuk */
        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-400px) translateX(40px); }
            90% { opacity: 1; }
            100% { transform: translateY(-900px) translateX(-40px); opacity: 0; }
        }

        /* --- ELEMEN UTAMA WEBSITE --- */
        .header-bg {
            background-color: #000;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            height: 180px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .profile-section {
            text-align: center;
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2b1b3d;
            border: 6px solid #fef7f9; 
            object-fit: cover;
            background-image: url('upphoto.jpg');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
            animation: fadeUp 1s ease-out forwards, floatCute 3s ease-in-out infinite 1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .name {
            font-family: 'Alex Brush', cursive;
            font-size: 3.8rem; 
            font-weight: normal;
            margin-top: 15px;
            line-height: 1;
            color: #d81b60; 
            animation: fadeUp 1s ease-out 0.2s forwards, softPulse 4s infinite 1.2s;
            opacity: 0;
            text-shadow: 1px 1px 0 #fff;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px; 
            margin-top: 5px;
            margin-bottom: 35px;
            font-weight: 400;
            color: #888;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
        }

        .links-container {
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            position: relative;
            z-index: 2;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            color: #d81b60;
            background-color: #fff; 
            border: 2px solid transparent; 
            padding: 14px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-weight: 400;
            border-radius: 50px; 
            box-shadow: 0 3px 8px rgba(216, 27, 96, 0.1);
            transition: all 0.5s cubic-bezier(0.68, -0.6, 0.27, 1.55);
            opacity: 0;
            animation: fadeUpCute 0.6s ease-out forwards;
        }

        .link-btn:nth-child(1) { animation-delay: 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.6s; }
        .link-btn:nth-child(3) { animation-delay: 0.7s; }
        .link-btn:nth-child(4) { animation-delay: 0.8s; }
        .link-btn:nth-child(5) { animation-delay: 0.9s; }

        .link-btn::after {
            content: '\f004'; 
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 12px;
            position: absolute;
            left: 20px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: scale(1.06); 
            background-color: #fce4ec;
            border-color: #ff80ab;
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.2);
            font-weight: bold;
        }

        .link-btn:hover::after {
            opacity: 1;
            transform: scale(1.2); 
        }

        .link-btn.underline {
            text-decoration: none;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px; 
            margin-top: 45px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .icon-circle {
            width: 45px;
            height: 45px;
            background-color: #fff;
            border: 2px solid transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d81b60;
            text-decoration: none;
            font-size: 1.3rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0;
            animation: fadeUpCute 0.6s ease-out forwards;
        }

        .icon-circle:nth-child(1) { animation-delay: 1.0s; }
        .icon-circle:nth-child(2) { animation-delay: 1.1s; }
        .icon-circle:nth-child(3) { animation-delay: 1.2s; }

        .icon-circle:hover {
            transform: translateY(-10px) rotate(360deg); 
            color: #fff;
            background-color: #ff80ab;
            box-shadow: 0 6px 15px rgba(255, 128, 171, 0.4);
        }

        .footer-banner {
            border-top: 1px solid #fce4ec;
            border-bottom: 1px solid #fce4ec;
            background-color: #fff;
            color: #888;
            text-align: center;
            padding: 18px 10px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            position: absolute;
            bottom: 15px;
            width: 90%;
            left: 5%;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.04);
            z-index: 2;
        }

        @keyframes fadeUpCute {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes floatCute {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        @keyframes softPulse {
            0%, 100% { opacity: 1; text-shadow: 1px 1px 0 #fff; }
            50% { opacity: 0.9; text-shadow: 1px 1px 10px rgba(216, 27, 96, 0.2); }
        }
        @keyframes heartFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
            10% { opacity: 0.5; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-500px) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
