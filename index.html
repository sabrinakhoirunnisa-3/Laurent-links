<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabrina Laurent - Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fce4ec; /* Warna krem kemerahan super soft */
            display: flex;
            justify-content: center;
            color: #000;
            overflow: hidden; /* Mencegah scrollbar body, tapi container bisa di-scroll */
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: #fef7f9; /* Hampir putih tapi ada tone pink imut */
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* Bayangan soft agar lebih berdimensi */
        }

        /* --- BACKGROUND HEARTS (SUPER CUTEEE) --- */
        .background-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Klik bisa menembus hati ini */
            z-index: 0;
        }

        .heart-particle {
            position: absolute;
            color: #ff80ab; /* Pink soft */
            font-size: 14px;
            opacity: 0.5;
            animation: heartFloat infinite linear;
        }

        /* Mengatur posisi dan durasi hati yang berbeda-beda */
        .heart-particle:nth-child(1) { left: 10%; top: 20%; animation-duration: 15s; }
        .heart-particle:nth-child(2) { left: 80%; top: 30%; animation-duration: 20s; animation-delay: -5s; font-size: 18px; }
        .heart-particle:nth-child(3) { left: 40%; top: 50%; animation-duration: 18s; animation-delay: -2s; }
        .heart-particle:nth-child(4) { left: 90%; top: 70%; animation-duration: 25s; }
        .heart-particle:nth-child(5) { left: 20%; top: 85%; animation-duration: 22s; animation-delay: -10s; font-size: 16px;}
        .heart-particle:nth-child(6) { left: 70%; top: 90%; animation-duration: 17s; animation-delay: -7s; }

        .header-bg {
            background-color: #000;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            height: 180px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .profile-section {
            text-align: center;
            margin-top: -60px;
            position: relative;
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2b1b3d;
            border: 6px solid #fef7f9; /* Border lebih tebal biar lebih imut */
            object-fit: cover;
            background-image: url('upphoto.jpg');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
            /* Animasi Muncul & Melayang */
            animation: fadeUp 1s ease-out forwards, floatCute 3s ease-in-out infinite 1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .name {
            font-family: 'Alex Brush', cursive;
            font-size: 3.8rem; /* Sedikit lebih besar */
            font-weight: normal;
            margin-top: 15px;
            line-height: 1;
            color: #d81b60; /* Warna pink gelap yang elegan */
            /* Animasi Denyut Pulse Lembut */
            animation: fadeUp 1s ease-out 0.2s forwards, softPulse 4s infinite 1.2s;
            opacity: 0;
            text-shadow: 1px 1px 0 #fff;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px; /* Lebih renggang biar aesthetic */
            margin-top: 5px;
            margin-bottom: 35px;
            font-weight: 400;
            color: #888;
            /* Animasi */
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
        }

        .links-container {
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Jarak lebih pas */
            position: relative;
            z-index: 1;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            color: #d81b60;
            background-color: #fff; /* Tombol putih biar clean */
            border: 2px solid transparent; /* Border imut tersembunyi */
            padding: 14px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-weight: 400;
            border-radius: 50px; /* Sangat bulat (imut!) */
            box-shadow: 0 3px 8px rgba(216, 27, 96, 0.1);
            /* Transisi SQUISHY cubic-bezier */
            transition: all 0.5s cubic-bezier(0.68, -0.6, 0.27, 1.55);
            /* Animasi Muncul Berurutan */
            opacity: 0;
            animation: fadeUpCute 0.6s ease-out forwards;
        }

        /* Delay animasi tiap tombol */
        .link-btn:nth-child(1) { animation-delay: 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.6s; }
        .link-btn:nth-child(3) { animation-delay: 0.7s; }
        .link-btn:nth-child(4) { animation-delay: 0.8s; }
        .link-btn:nth-child(5) { animation-delay: 0.9s; }

        /* Pseudo-element untuk hati yang muncul saat hover */
        .link-btn::after {
            content: '\f004'; /* Ikon hati fa-heart */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 12px;
            position: absolute;
            left: 20px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: scale(1.06); /* Mengembang lebih squishy */
            background-color: #fce4ec;
            border-color: #ff80ab;
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.2);
            font-weight: bold;
        }

        .link-btn:hover::after {
            opacity: 1;
            transform: scale(1.2); /* Hati "tumbuh" imut */
        }

        .link-btn.underline {
            /* Hapus underline default biar lebih rapi bulatnya */
            text-decoration: none;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px; /* Lebih berjarak */
            margin-top: 45px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .icon-circle {
            width: 45px;
            height: 45px;
            background-color: #fff;
            border: 2px solid transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d81b60;
            text-decoration: none;
            font-size: 1.3rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
            /* Transisi Bouncy cubic-bezier */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            /* Animasi */
            opacity: 0;
            animation: fadeUpCute 0.6s ease-out forwards;
        }

        /* Delay animasi ikon */
        .icon-circle:nth-child(1) { animation-delay: 1.0s; }
        .icon-circle:nth-child(2) { animation-delay: 1.1s; }
        .icon-circle:nth-child(3) { animation-delay: 1.2s; }

        .icon-circle:hover {
            transform: translateY(-10px) rotate(360deg); /* Berputar penuh & melompat imut */
            color: #fff;
            background-color: #ff80ab;
            box-shadow: 0 6px 15px rgba(255, 128, 171, 0.4);
        }

        .footer-banner {
            border-top: 1px solid #fce4ec;
            border-bottom: 1px solid #fce4ec;
            background-color: #fff;
            color: #888;
            text-align: center;
            padding: 18px 10px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            position: absolute;
            bottom: 15px;
            width: 90%;
            left: 5%;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.04);
            z-index: 1;
        }

        /* --- KUMPULAN ANIMASI (SUPER CUTEEE KEYFRAMES) --- */
        
        /* Animasi naik & membal */
        @keyframes fadeUpCute {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Duplicate fadeUp for elements that shouldn't bounce on initial load */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animasi melayang naik turun (Cuter & Softer) */
        @keyframes floatCute {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-10px) scale(1.02); /* Sedikit membesar saat melayang */
            }
        }

        /* Animasi denyut lembut di judul */
        @keyframes softPulse {
            0%, 100% {
                opacity: 1;
                text-shadow: 1px 1px 0 #fff;
            }
            50% {
                opacity: 0.9;
                text-shadow: 1px 1px 10px rgba(216, 27, 96, 0.2);
            }
        }

        /* Animasi hati melayang di background */
        @keyframes heartFloat {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.1;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.1; }
            100% {
                transform: translateY(-500px) rotate(360deg);
                opacity: 0;
            }
        }

    </style>
</head>
